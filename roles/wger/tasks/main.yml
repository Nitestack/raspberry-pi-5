---
- name: Deploy wger
  ansible.builtin.include_role:
    name: service_deploy
  vars:
    service_name: "wger"
    service_dir_name: "{{ wger_dir_name }}"
    compose_url: "https://raw.githubusercontent.com/wger-project/docker/75e44fe24c6fe9bcd98215270b74b5a1d6ed788d/docker-compose.yml"
    env_url: "https://raw.githubusercontent.com/wger-project/docker/d595c4ba9aa8157c9b1a715eef7db0ce8125b0a1/config/prod.env"
    service_downloads:
      - url: "https://raw.githubusercontent.com/wger-project/docker/refs/heads/master/config/redis.conf"
        dest: "redis.conf"
    data_dirs:
      - "static"
      - "media"
      - "db"
      - "redis"
      - "beat"
