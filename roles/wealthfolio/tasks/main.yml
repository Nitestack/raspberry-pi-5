---
- name: Deploy Wealthfolio
  ansible.builtin.include_role:
    name: service_deploy
  vars:
    service_name: "Wealthfolio"
    service_dir_name: "{{ wealthfolio_dir_name }}"
    compose_url: "https://raw.githubusercontent.com/wealthfolio/wealthfolio/e4e9fdf025f2725e1d7e79fd822310e53fbf2551/compose.yml"
    data_dirs:
      - "data"
